<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio | Premium YouTube</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── Genel Ayarlar ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff;}

/* ── YouTube Arka Plan ── */
#yt-bg {
  position: fixed;
  top: 50%; left: 50%;
  width: 100vw; height: 100vh;
  min-width: 177.78vh; /* 16:9 Oranı */
  min-height: 56.25vw;
  transform: translate(-50%, -50%);
  z-index: 0;
  pointer-events: none; /* Tıklamaları engeller, video durdurulamaz */
  filter: blur(15px); /* Başlangıçta bulanık */
  transition: filter 1.5s ease;
}
#yt-iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}
/* Karartma katmanı */
.overlay {
  position: fixed; inset: 0; z-index: 1;
  background: rgba(0,0,0,0.5);
}

/* ── "Click to Enter" Ekranı ── */
#enter-screen {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  cursor: pointer;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
.enter-text {
  font-size: 16px; font-weight: 500; letter-spacing: 3px;
  text-transform: lowercase;
  animation: pulse 2s infinite;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
@keyframes pulse { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }

/* ── Ana İçerik Konteyneri ── */
#main-content {
  position: relative; z-index: 10;
  display: none; 
  flex-direction: column; align-items: center;
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  transition: opacity 1s cubic-bezier(0.2, 1, 0.3, 1), transform 1s cubic-bezier(0.2, 1, 0.3, 1);
}
#main-content.visible {
  opacity: 1; transform: translateY(0) scale(1);
}

/* ── Premium Glassmorphism Kart ── */
.card {
  width: 360px;
  background: rgba(15, 15, 20, 0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 35px 30px;
  display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

/* ── Profil Resmi ── */
.avatar-ring {
  width: 100px; height: 100px; border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, var(--accent, #fff), rgba(255,255,255,0.1));
  margin-bottom: 15px; flex-shrink: 0;
  box-shadow: 0 0 25px var(--accent-glow, rgba(255,255,255,0.1));
}
.avatar-img {width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background: #111;}

/* ── Rozetler ve Metinler ── */
.badges {display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center;}
.badge {display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;}
.badge-nitro {color: #f9a8f9; background: rgba(255,115,250,.1); border-color: rgba(255,115,250,.3);}

.display-name {font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px;}
.username-tag {font-size: 14px; color: rgba(255,255,255,.5); margin-bottom: 15px;}

/* ── Bilgi Satırları ── */
.info-row {width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px;}
.info-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-radius: 12px;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
  font-size: 13px;
}
.info-label {color: rgba(255,255,255,0.4); font-weight: 500;}
.info-val {font-weight: 600; color: #fff;}

/* ── Butonlar ── */
.action-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: #fff; color: #000; font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: transform 0.2s, background 0.2s;
  display: flex; justify-content: center; align-items: center; gap: 8px;
}
.action-btn:hover {transform: translateY(-2px); background: #eee;}
.logout-btn {margin-top: 15px; font-size: 12px; color: rgba(255,255,255,.2); background: none; border: none; cursor: pointer; transition: color 0.2s;}
.logout-btn:hover {color: #fff;}

/* Ses İkonu */
#volume-toggle {
  position: absolute; top: 20px; right: 20px; z-index: 20;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  backdrop-filter: blur(5px); opacity: 0; transition: opacity 1s; color: #fff; font-size: 16px;
}
</style>
</head>
<body>

<div id="yt-bg">
  <div id="yt-iframe"></div>
</div>
<div class="overlay"></div>

<button id="volume-toggle" onclick="toggleMute()">🔊</button>

<div id="enter-screen" onclick="enterSite()">
  <div class="enter-text">[ click to enter ]</div>
</div>

<div id="main-content">
  <div class="card">
    <div id="login-section" style="width:100%; display:flex; flex-direction:column; align-items:center;">
      <h2 style="margin-bottom: 20px; font-weight:700;">Bio Sayfam</h2>
      <button class="action-btn" onclick="loginWithDiscord()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord ile Devam Et
      </button>
    </div>

    <div id="profile-section" style="display:none; width:100%; flex-direction:column; align-items:center;">
      <div class="avatar-ring" id="avatar-ring-el">
        <div id="avatar-wrap"></div>
      </div>
      
      <div class="badges" id="badges">
        <span class="badge">Discord</span>
      </div>

      <h1 class="display-name" id="display-name">...</h1>
      <p class="username-tag" id="username-tag">...</p>
      
      <div class="info-row">
        <div class="info-item">
          <span class="info-label">Katılım</span>
          <span class="info-val" id="joined-date">...</span>
        </div>
        <div class="info-item">
          <span class="info-label">ID</span>
          <span class="info-val" id="user-id">...</span>
        </div>
      </div>
    </div>
  </div>
  
  <button id="logout-btn-el" class="logout-btn" style="display:none;" onclick="logout()">Çıkış Yap</button>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* ═══════════════════════════════════════
   ⚙️ AYARLAR KISMI
   ═══════════════════════════════════════ */
const CLIENT_ID    = "1491395268200108052";
const REDIRECT_URI = "https://com10w.github.io/biopage/";
const YOUTUBE_VIDEO_ID = "BOLhTmH2dvU"; // İstediğin YouTube video ID'si
/* ═══════════════════════════════════════ */

let player;
let isMuted = false;

// ── 1. YOUTUBE API (Arka planda sessizce başlatır) ──
function onYouTubeIframeAPIReady() {
  player = new YT.Player('yt-iframe', {
    videoId: YOUTUBE_VIDEO_ID,
    host: 'https://www.youtube-nocookie.com',
    playerVars: {
      autoplay: 1,      // Otomatik başla
      mute: 1,          // Başlangıçta sessiz (tarayıcı engellemesin diye)
      controls: 0,
      showinfo: 0,
      rel: 0,
      loop: 1,
      playlist: YOUTUBE_VIDEO_ID,
      iv_load_policy: 3,
      modestbranding: 1,
      disablekb: 1,
      vq: 'hd1080'
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  event.target.playVideo();
}

// Video bittiğinde KESİN OLARAK başa sarar (Sonsuz Döngü Garantisi)
function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    player.seekTo(0);
    player.playVideo();
  }
}

// ── 2. CLICK TO ENTER MANTIĞI ──
function enterSite() {
  // Giriş ekranını gizle
  document.getElementById('enter-screen').style.opacity = '0';
  setTimeout(() => { document.getElementById('enter-screen').style.visibility = 'hidden'; }, 800);
  
  // Arka plandaki bulanıklığı (blur) kaldır
  document.getElementById('yt-bg').style.filter = 'blur(0px)';

  // Sesi patlat (Tarayıcı tıklama aldığı için artık izin verir)
  if(player && typeof player.unMute === 'function') {
    player.unMute();
    player.setVolume(100);
    isMuted = false;
  }

  // Profil kartını ve Ses butonunu ekrana getir
  document.getElementById('main-content').style.display = 'flex';
  setTimeout(() => { 
    document.getElementById('main-content').classList.add('visible'); 
    document.getElementById('volume-toggle').style.opacity = '1';
  }, 100);
}

// ── 3. SES AÇ/KAPAT BUTONU ──
function toggleMute() {
  if (!player || typeof player.unMute !== 'function') return;

  if (isMuted) {
    player.unMute();     
    isMuted = false;
    document.getElementById("volume-toggle").textContent = "🔊";
  } else {
    player.mute();       
    isMuted = true;
    document.getElementById("volume-toggle").textContent = "🔇";
  }
}

// ── 4. DISCORD OAUTH İŞLEMLERİ ──
function loginWithDiscord() {
  const p = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: "token",
    scope: "identify",
  });
  window.location.href = `https://discord.com/oauth2/authorize?${p}`;
}

function getTokenFromHash() {
  return new URLSearchParams(window.location.hash.slice(1)).get("access_token");
}

async function fetchUser(token) {
  const r = await fetch("https://discord.com/api/v10/users/@me", {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!r.ok) throw new Error();
  return r.json();
}

function discordIdToDate(id) {
  const ms = BigInt(id) >> 22n;
  const date = new Date(Number(ms) + 1420070400000);
  return date.toLocaleDateString("tr-TR", { year:"numeric", month:"long", day:"numeric" });
}

function showProfile(user) {
  const avatarUrl = user.avatar
    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256`
    : `https://cdn.discordapp.com/embed/avatars/${Number(BigInt(user.id) % 6n)}.png`;

  document.getElementById("avatar-wrap").innerHTML = `<img class="avatar-img" src="${avatarUrl}" alt="avatar">`;

  document.getElementById("display-name").textContent = user.global_name || user.username;
  document.getElementById("username-tag").textContent = `@${user.username}`;
  document.getElementById("user-id").textContent      = user.id;
  document.getElementById("joined-date").textContent  = discordIdToDate(user.id);

  if (user.accent_color) {
    const hex = "#" + user.accent_color.toString(16).padStart(6,"0");
    document.documentElement.style.setProperty("--accent", hex);
    document.documentElement.style.setProperty("--accent-glow", `rgba(${parseInt(hex.slice(1,3),16)},${parseInt(hex.slice(3,5),16)},${parseInt(hex.slice(5,7),16)},0.4)`);
  }

  if (user.premium_type && user.premium_type > 0) {
    const b = document.getElementById("badges");
    if (!b.innerHTML.includes("Nitro")) {
      b.innerHTML += `<span class="badge badge-nitro">Nitro</span>`;
    }
  }

  document.getElementById("login-section").style.display = "none";
  document.getElementById("profile-section").style.display = "flex";
  document.getElementById("logout-btn-el").style.display = "block";
}

function logout() {
  sessionStorage.removeItem("dc_token");
  window.history.replaceState(null,"",window.location.pathname);
  document.getElementById("login-section").style.display = "flex";
  document.getElementById("profile-section").style.display = "none";
  document.getElementById("logout-btn-el").style.display = "none";
}

(async () => {
  let token = getTokenFromHash() || sessionStorage.getItem("dc_token");
  if (!token) return;

  sessionStorage.setItem("dc_token", token);
  window.history.replaceState(null,"",window.location.pathname);

  try {
    const user = await fetchUser(token);
    showProfile(user);
  } catch {
    sessionStorage.removeItem("dc_token");
  }
})();
</script>
</body>
</html>
