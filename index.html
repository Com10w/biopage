<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bio</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}

/* ── Video arka plan (titreme yok) ── */
#yt-bg{
  position:fixed;
  top:50%; left:50%;
  width:100vw; height:100vh;
  min-width:177.78vh; /* 16:9 */
  min-height:56.25vw;
  transform:translate(-50%,-50%);
  z-index:0;
  pointer-events:none;
}
#yt-bg iframe{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  border:none;
}

/* Overlay — blur yok, sadece hafif karartma */
.overlay{
  position:fixed;inset:0;z-index:1;
  background:rgba(0,0,0,0.40);
}

/* Ses butonu */
#sound-btn{
  position:fixed;top:16px;right:16px;z-index:10;
  background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:999px;
  padding:8px 14px;
  color:#fff;font-size:13px;font-family:inherit;
  cursor:pointer;display:flex;align-items:center;gap:6px;
  transition:background .2s;
  backdrop-filter:none;
}
#sound-btn:hover{background:rgba(255,255,255,0.18);}

/* ── Login ekranı ── */
#login-screen{position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;gap:16px;animation:rise .5s ease both;}
.login-title{font-size:32px;font-weight:700;color:#fff;letter-spacing:-.5px;}
.login-sub{font-size:14px;color:rgba(255,255,255,.4);}
.login-btn{
  display:flex;align-items:center;gap:10px;
  padding:14px 30px;border-radius:14px;border:none;
  background:#5865F2;color:#fff;
  font-size:15px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:background .2s,transform .15s;
}
.login-btn:hover{background:#4752c4;transform:translateY(-2px);}
.login-btn svg{width:22px;height:22px;}

/* ── Profil ekranı ── */
#profile-screen{position:relative;z-index:2;display:none;flex-direction:column;align-items:center;}

/* Kart */
.card{
  width:360px;
  background:rgba(15,15,20,0.75);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:22px;
  padding:32px 26px 24px;
  display:flex;flex-direction:column;align-items:center;
  animation:rise .55s cubic-bezier(.22,1,.36,1) both;
}
@keyframes rise{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:none;}}

/* Avatar */
.avatar-ring{
  width:96px;height:96px;border-radius:50%;
  padding:3px;
  background:linear-gradient(135deg,var(--accent,#5865F2),rgba(88,101,242,.2));
  margin-bottom:12px;flex-shrink:0;
}
.avatar-img{width:90px;height:90px;border-radius:50%;object-fit:cover;display:block;background:#111;}

/* Nitro / premium rozeti */
.badges{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap;justify-content:center;}
.badge{
  display:flex;align-items:center;gap:4px;
  padding:3px 9px;border-radius:999px;
  font-size:11px;font-weight:500;
}
.badge-dc{background:rgba(88,101,242,.2);border:1px solid rgba(88,101,242,.35);color:#a5aef5;}
.badge-nitro{background:rgba(255,115,250,.15);border:1px solid rgba(255,115,250,.3);color:#f9a8f9;}

.display-name{font-size:22px;font-weight:700;color:#fff;letter-spacing:-.3px;text-align:center;margin-bottom:3px;}
.username-tag{font-size:13px;color:rgba(255,255,255,.35);margin-bottom:6px;}

/* Katılım tarihi */
.joined{font-size:12px;color:rgba(255,255,255,.28);margin-bottom:16px;}

/* Divider */
.divider{width:100%;height:1px;background:linear-gradient(to right,transparent,rgba(255,255,255,.08),transparent);margin-bottom:16px;}

/* Info satırları */
.info-row{width:100%;display:flex;flex-direction:column;gap:8px;margin-bottom:16px;}
.info-item{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-radius:12px;
  border:1px solid rgba(255,255,255,.07);
  background:rgba(255,255,255,.04);
}
.info-icon{font-size:16px;flex-shrink:0;width:20px;text-align:center;}
.info-text{flex:1;}
.info-label{font-size:10px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.05em;}
.info-val{font-size:13px;color:#fff;font-weight:500;margin-top:1px;}

/* YouTube panel */
.yt-row{width:100%;}
.btn{
  width:100%;padding:12px 16px;border-radius:12px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.05);
  color:#fff;font-size:13px;font-family:inherit;cursor:pointer;
  display:flex;align-items:center;gap:10px;
  transition:background .18s,border-color .18s,transform .13s;
}
.btn:hover{background:rgba(88,101,242,.15);border-color:rgba(88,101,242,.4);transform:translateY(-1px);}
.btn-icon{font-size:16px;flex-shrink:0;}
.btn-label{flex:1;font-weight:500;text-align:left;}
.btn-arrow{font-size:12px;color:rgba(255,255,255,.25);}
.btn:hover .btn-arrow{color:var(--accent,#5865F2);}

.yt-panel{display:none;flex-direction:column;gap:8px;margin-top:8px;}
.yt-panel.open{display:flex;}
.yt-input{
  width:100%;padding:10px 13px;border-radius:11px;
  border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.05);
  color:#fff;font-size:13px;font-family:inherit;outline:none;
}
.yt-input::placeholder{color:rgba(255,255,255,.25);}
.yt-input:focus{border-color:rgba(255,50,50,.5);}
.yt-apply{padding:9px;border-radius:11px;border:none;background:rgba(200,30,30,.8);color:#fff;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;transition:background .2s;}
.yt-apply:hover{background:rgba(220,30,30,1);}

.logout-btn{margin-top:12px;font-size:12px;color:rgba(255,255,255,.18);background:none;border:none;cursor:pointer;font-family:inherit;transition:color .2s;}
.logout-btn:hover{color:rgba(255,255,255,.45);}

.footer{margin-top:14px;font-size:11px;color:rgba(255,255,255,.12);text-align:center;}
</style>
</head>
<body>

<div id="yt-bg">
  <iframe id="yt-iframe"
    src="https://www.youtube-nocookie.com/embed/jfKfPfyJRdk?autoplay=1&mute=1&loop=1&playlist=jfKfPfyJRdk&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&disablekb=1&enablejsapi=1"
    allow="autoplay;encrypted-media"
    allowfullscreen></iframe>
</div>
<div class="overlay"></div>

<button id="sound-btn" onclick="toggleSound()">
  <span id="sound-icon">🔇</span> <span id="sound-label">Sesi Aç</span>
</button>

<div id="login-screen">
  <p class="login-title">Bio Sayfam</p>
  <p class="login-sub">Discord hesabınla devam et</p>
  <button class="login-btn" onclick="loginWithDiscord()">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
    Discord ile Giriş Yap
  </button>
</div>

<div id="profile-screen">
  <div class="card">

    <div class="avatar-ring">
      <div id="avatar-wrap"></div>
    </div>

    <div class="badges" id="badges">
      <span class="badge badge-dc">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.791 19.791 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028c.462-.63.874-1.295 1.226-1.994a.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.839 19.839 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03z"/></svg>
        Discord
      </span>
    </div>

    <h1 class="display-name" id="display-name">...</h1>
    <p class="username-tag" id="username-tag">...</p>
    <p class="joined" id="joined-date">...</p>

    <div class="divider"></div>

    <div class="info-row">
      <div class="info-item">
        <span class="info-icon">🪪</span>
        <div class="info-text">
          <div class="info-label">Kullanıcı ID</div>
          <div class="info-val" id="user-id">...</div>
        </div>
      </div>
      <div class="info-item">
        <span class="info-icon">🌐</span>
        <div class="info-text">
          <div class="info-label">Profil</div>
          <div class="info-val" id="profile-link">...</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="yt-row">
      <button class="btn" onclick="toggleYt()">
        <span class="btn-icon">▶</span>
        <span class="btn-label">Arka planı değiştir</span>
        <span class="btn-arrow" id="yt-arrow">›</span>
      </button>
      <div class="yt-panel" id="yt-panel">
        <input class="yt-input" id="yt-input" placeholder="YouTube linki veya video ID">
        <button class="yt-apply" onclick="applyVideo()">Uygula</button>
      </div>
    </div>

    <p class="footer">discord oauth · kişisel bio</p>
  </div>
  <button class="logout-btn" onclick="logout()">Çıkış yap</button>
</div>

<script>
/* ═══════════════════════════════════════
   ⚙️  SADECE BU İKİ SATIRI DEĞİŞTİR
   ═══════════════════════════════════════ */
const CLIENT_ID    = "1491395268200108052";
const REDIRECT_URI = "https://com10w.github.io/biopage/";
/* ═══════════════════════════════════════ */

// ── Discord OAuth ──────────────────────
function loginWithDiscord() {
  const p = new URLSearchParams({
    client_id: CLIENT_ID,
    redirect_uri: REDIRECT_URI,
    response_type: "token",
    scope: "identify",
  });
  window.location.href = `https://discord.com/oauth2/authorize?${p}`;
}

function getTokenFromHash() {
  return new URLSearchParams(window.location.hash.slice(1)).get("access_token");
}

async function fetchUser(token) {
  const r = await fetch("https://discord.com/api/v10/users/@me", {
    headers: { Authorization: `Bearer ${token}` }
  });
  if (!r.ok) throw new Error();
  return r.json();
}

// ── Discord ID'den hesap oluşturma tarihi ──
function discordIdToDate(id) {
  const ms = BigInt(id) >> 22n;
  const date = new Date(Number(ms) + 1420070400000);
  return date.toLocaleDateString("tr-TR", { year:"numeric", month:"long", day:"numeric" });
}

// ── Profili göster ─────────────────────
function showProfile(user) {
  const avatarUrl = user.avatar
    ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png?size=256`
    : `https://cdn.discordapp.com/embed/avatars/${Number(BigInt(user.id) % 6n)}.png`;

  document.getElementById("avatar-wrap").innerHTML =
    `<img class="avatar-img" src="${avatarUrl}" alt="avatar">`;

  const displayName = user.global_name || user.username;
  document.getElementById("display-name").textContent  = displayName;
  document.getElementById("username-tag").textContent  = `@${user.username}`;
  document.getElementById("user-id").textContent       = user.id;
  document.getElementById("joined-date").textContent   = `Discord'a katılım: ${discordIdToDate(user.id)}`;
  document.getElementById("profile-link").textContent  = `discord.com/users/${user.id}`;

  if (user.accent_color) {
    const hex = "#" + user.accent_color.toString(16).padStart(6,"0");
    document.documentElement.style.setProperty("--accent", hex);
    document.getElementById("avatar-ring-el")?.style.setProperty("background", `linear-gradient(135deg,${hex},rgba(88,101,242,.2))`);
  }

  if (user.premium_type && user.premium_type > 0) {
    const b = document.getElementById("badges");
    b.innerHTML += `<span class="badge badge-nitro">✦ Nitro</span>`;
  }

  document.getElementById("login-screen").style.display   = "none";
  document.getElementById("profile-screen").style.display = "flex";
}

function logout() {
  sessionStorage.removeItem("dc_token");
  window.history.replaceState(null,"",window.location.pathname);
  document.getElementById("login-screen").style.display   = "flex";
  document.getElementById("profile-screen").style.display = "none";
}

// ── YouTube (Optimize Edilmiş Nocookie Yöntemi) ──
let isMuted = true;

function setVideo(id) {
  // Nocookie ve dikkat dağıtıcı öğeleri kapatan parametreler eklendi
  document.getElementById("yt-iframe").src =
    `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&disablekb=1`;
  isMuted = true;
  document.getElementById("sound-icon").textContent  = "🔇";
  document.getElementById("sound-label").textContent = "Sesi Aç";
}

function toggleSound() {
  const iframe = document.getElementById("yt-iframe");
  const src = iframe.src;
  const videoId = src.match(/embed\/([^?]+)/)?.[1];
  
  if (!videoId) return;

  if (isMuted) {
    iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&mute=0&loop=1&playlist=${videoId}&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&disablekb=1`;
    isMuted = false;
    document.getElementById("sound-icon").textContent  = "🔊";
    document.getElementById("sound-label").textContent = "Sessiz";
  } else {
    iframe.src = `https://www.youtube-nocookie.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1&disablekb=1`;
    isMuted = true;
    document.getElementById("sound-icon").textContent  = "🔇";
    document.getElementById("sound-label").textContent = "Sesi Aç";
  }
}

function toggleYt() {
  const open = document.getElementById("yt-panel").classList.toggle("open");
  document.getElementById("yt-arrow").textContent = open ? "˅" : "›";
}

function applyVideo() {
  let v = document.getElementById("yt-input").value.trim();
  try { v = new URL(v).searchParams.get("v") || v; } catch {}
  if (v) { setVideo(v); sessionStorage.setItem("yt_id", v); }
}

document.getElementById("yt-input").addEventListener("keydown", e => {
  if (e.key === "Enter") applyVideo();
});

// ── Başlangıç ──────────────────────────
(async () => {
  const savedYt = sessionStorage.getItem("yt_id");
  if (savedYt) setVideo(savedYt);

  let token = getTokenFromHash() || sessionStorage.getItem("dc_token");
  if (!token) return;

  sessionStorage.setItem("dc_token", token);
  window.history.replaceState(null,"",window.location.pathname);

  try {
    const user = await fetchUser(token);
    showProfile(user);
  } catch {
    sessionStorage.removeItem("dc_token");
  }
})();
</script>
</body>
</html>
