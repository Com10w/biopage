<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Benim Bio Sayfam</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
/* ── Genel Ayarlar ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:#000;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;color:#fff;}

/* ── YouTube Arka Plan ── */
#yt-bg {
  position: fixed;
  top: 50%; left: 50%;
  width: 100vw; height: 100vh;
  min-width: 177.78vh; 
  min-height: 56.25vw;
  transform: translate(-50%, -50%);
  z-index: 0;
  pointer-events: none; 
  filter: blur(15px); 
  transition: filter 1.5s ease;
}
#yt-iframe {
  position: absolute; top: 0; left: 0;
  width: 100%; height: 100%;
  border: none;
}
.overlay {
  position: fixed; inset: 0; z-index: 1;
  background: rgba(0,0,0,0.5);
}

/* ── "Click to Enter" Ekranı ── */
#enter-screen {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center;
  background: transparent;
  cursor: pointer;
  transition: opacity 0.8s ease, visibility 0.8s ease;
}
.enter-text {
  font-size: 16px; font-weight: 500; letter-spacing: 3px;
  text-transform: lowercase;
  animation: pulse 2s infinite;
  text-shadow: 0 0 10px rgba(255,255,255,0.5);
}
@keyframes pulse { 0%, 100% {opacity: 1;} 50% {opacity: 0.3;} }

/* ── Ana İçerik Konteyneri ── */
#main-content {
  position: relative; z-index: 10;
  display: none; 
  flex-direction: column; align-items: center;
  opacity: 0;
  transform: translateY(30px) scale(0.95);
  transition: opacity 1s cubic-bezier(0.2, 1, 0.3, 1), transform 1s cubic-bezier(0.2, 1, 0.3, 1);
}
#main-content.visible {
  opacity: 1; transform: translateY(0) scale(1);
}

/* ── Premium Glassmorphism Kart ── */
.card {
  width: 360px;
  background: rgba(15, 15, 20, 0.4);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 24px;
  padding: 35px 30px;
  display: flex; flex-direction: column; align-items: center;
  box-shadow: 0 30px 60px rgba(0,0,0,0.5);
}

/* ── Profil Resmi ── */
/* Buradaki var(--accent) rengini kendi zevkine göre değiştirebilirsin */
:root {
  --accent: #5865F2; /* Şuan Discord mavisi, burayı #ff0000 yaparsan kırmızı olur */
  --accent-glow: rgba(88, 101, 242, 0.4);
}

.avatar-ring {
  width: 100px; height: 100px; border-radius: 50%;
  padding: 3px;
  background: linear-gradient(135deg, var(--accent), rgba(255,255,255,0.1));
  margin-bottom: 15px; flex-shrink: 0;
  box-shadow: 0 0 25px var(--accent-glow);
}
.avatar-img {width: 100%; height: 100%; border-radius: 50%; object-fit: cover; display: block; background: #111;}

/* ── Rozetler ve Metinler ── */
.badges {display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; justify-content: center;}
.badge {display: flex; align-items: center; gap: 4px; padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff;}
.badge-nitro {color: #f9a8f9; background: rgba(255,115,250,.1); border-color: rgba(255,115,250,.3);}
.badge-dev {color: #43b581; background: rgba(67,181,129,.1); border-color: rgba(67,181,129,.3);}

.display-name {font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 4px; text-align: center;}
.username-tag {font-size: 14px; color: rgba(255,255,255,.5); margin-bottom: 15px;}

/* ── Bilgi Satırları (Sosyal Medya vs eklenebilir) ── */
.info-row {width: 100%; display: flex; flex-direction: column; gap: 10px; margin-bottom: 10px;}
.info-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px; border-radius: 12px;
  background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.05);
  font-size: 13px; text-decoration: none; transition: background 0.2s;
}
.info-item:hover { background: rgba(255,255,255,0.05); }
.info-label {color: rgba(255,255,255,0.4); font-weight: 500;}
.info-val {font-weight: 600; color: #fff;}

/* Ses İkonu */
#volume-toggle {
  position: absolute; top: 20px; right: 20px; z-index: 20;
  background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
  border-radius: 50%; width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center; cursor: pointer;
  backdrop-filter: blur(5px); opacity: 0; transition: opacity 1s; color: #fff; font-size: 16px;
}
</style>
</head>
<body>

<div id="yt-bg">
  <div id="yt-iframe"></div>
</div>
<div class="overlay"></div>

<button id="volume-toggle" onclick="toggleMute()">🔊</button>

<div id="enter-screen" onclick="enterSite()">
  <div class="enter-text">[ click to enter ]</div>
</div>

<div id="main-content">
  <div class="card">
    
    <div class="avatar-ring">
      <img class="avatar-img" src="https://i.imgur.com/SENIN_RESMIN.png" alt="Avatar">
    </div>
    
    <div class="badges">
      <span class="badge badge-nitro">!_Com10#</span>
      <span class="badge badge-dev">BOT</span>
    </div>

    <h1 class="display-name">Javo Manager</h1>
    <p class="username-tag">Javo Manager</p>
    
    <div class="info-row">
      <a href="https://instagram.com/hesabin" target="_blank" class="info-item">
        <span class="info-label">Instagram</span>
        <span class="info-val"></span>
      </a>
      <div class="info-item">
        <span class="info-label">Discord ID</span>
        <span class="info-val">1481026465993719868</span>
      </div>
    </div>

  </div>
</div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
/* ═══════════════════════════════════════
   ⚙️ SADECE BURADAKİ VİDEO ID'SİNİ DEĞİŞTİR
   ═══════════════════════════════════════ */
const YOUTUBE_VIDEO_ID = "BOLhTmH2dvU"; 
/* ═══════════════════════════════════════ */

let player;
let isMuted = false;

function onYouTubeIframeAPIReady() {
  player = new YT.Player('yt-iframe', {
    videoId: YOUTUBE_VIDEO_ID,
    host: 'https://www.youtube-nocookie.com',
    playerVars: {
      autoplay: 1, mute: 1, controls: 0, showinfo: 0,
      rel: 0, loop: 1, playlist: YOUTUBE_VIDEO_ID,
      iv_load_policy: 3, modestbranding: 1, disablekb: 1, vq: 'hd1080'
    },
    events: {
      'onReady': onPlayerReady,
      'onStateChange': onPlayerStateChange
    }
  });
}

function onPlayerReady(event) {
  event.target.playVideo();
}

function onPlayerStateChange(event) {
  if (event.data === YT.PlayerState.ENDED) {
    player.seekTo(0);
    player.playVideo();
  }
}

function enterSite() {
  document.getElementById('enter-screen').style.opacity = '0';
  setTimeout(() => { document.getElementById('enter-screen').style.visibility = 'hidden'; }, 800);
  
  document.getElementById('yt-bg').style.filter = 'blur(0px)';

  if(player && typeof player.unMute === 'function') {
    player.unMute();
    player.setVolume(100);
    isMuted = false;
  }

  document.getElementById('main-content').style.display = 'flex';
  setTimeout(() => { 
    document.getElementById('main-content').classList.add('visible'); 
    document.getElementById('volume-toggle').style.opacity = '1';
  }, 100);
}

function toggleMute() {
  if (!player || typeof player.unMute !== 'function') return;

  if (isMuted) {
    player.unMute();     
    isMuted = false;
    document.getElementById("volume-toggle").textContent = "🔊";
  } else {
    player.mute();       
    isMuted = true;
    document.getElementById("volume-toggle").textContent = "🔇";
  }
}
</script>
</body>
</html>
